# Genre hierarchy. Each key is a genre; its children are more specific sub-genres.
# Null (~) marks a leaf with no sub-genres defined yet.
#
# When a track is tagged with a sub-genre, the plugin automatically
# expands it to include all ancestors. For example, "Plugg" -> "Hip-Hop, Trap, Plugg".

tree:
  Hip-Hop:
    Trap:
      Plugg: ~
      "Mumble Rap": ~
      "SoundCloud Rap": ~
      "Phonk": ~
      Drill:
        "UK Drill": ~
        "Brooklyn Drill": ~
    "Boom Bap": ~
    "Lo-Fi Hip-Hop": ~
    "G-Funk": ~
    Crunk: ~
    "Conscious Hip-Hop": ~

  Electronic:
    House:
      "Deep House": ~
      "Tech House": ~
      "Future House": ~
      "Afro House": ~
    Techno: ~
    "Drum and Bass":
      Jungle: ~
    Ambient: ~
    "Trip-Hop": ~
    IDM: ~
    Trance:
      "Progressive Trance": ~
    Dubstep:
      Brostep: ~
    "Synth-Pop": ~

  Rock:
    "Indie Rock": ~
    "Alternative Rock": ~
    "Post-Punk": ~
    "Post-Rock": ~
    Metal:
      "Heavy Metal": ~
      "Black Metal": ~
      "Death Metal": ~
      "Doom Metal": ~

  Pop:
    "Indie Pop": ~
    "Dream Pop": ~
    "Art Pop": ~
    "Synth-Pop": ~

  R&B:
    "Neo-Soul": ~

  Soul: ~

  Funk: ~

  Jazz:
    Bebop: ~
    "Free Jazz": ~
    "Jazz Fusion": ~

  Classical: ~

  Folk:
    "Indie Folk": ~
    Country:
      "Alt-Country": ~

# Normalization aliases. Maps common Last.fm tag variants to the canonical
# genre names defined in the tree above. All keys must be lowercase.

aliases:
